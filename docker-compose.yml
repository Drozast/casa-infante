version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════
  # POSTGRESQL
  # ═══════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: casainfante-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-casainfante}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-casainfante_secret_2024}
      POSTGRES_DB: ${DB_NAME:-casainfante}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5441:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-casainfante}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - casainfante-network

  # ═══════════════════════════════════════════════════════════════════
  # REDIS
  # ═══════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: casainfante-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - casainfante-network

  # ═══════════════════════════════════════════════════════════════════
  # MINIO (S3 Storage)
  # ═══════════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: casainfante-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-casainfante_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-casainfante_minio_2024}
    volumes:
      - minio_data:/data
    ports:
      - "9020:9000"
      - "9021:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - casainfante-network

  # ═══════════════════════════════════════════════════════════════════
  # BACKEND (NestJS)
  # ═══════════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: casainfante-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3031
      DATABASE_URL: postgresql://${DB_USER:-casainfante}:${DB_PASSWORD:-casainfante_secret_2024}@postgres:5432/${DB_NAME:-casainfante}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-https://casainfante.drozast.xyz}
      TRANSBANK_COMMERCE_CODE: ${TRANSBANK_COMMERCE_CODE}
      TRANSBANK_API_KEY: ${TRANSBANK_API_KEY}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-casainfante_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-casainfante_minio_2024}
      MINIO_BUCKET: casainfante
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-Casa Infante <noreply@casainfante.cl>}
    ports:
      - "3041:3031"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - casainfante-network

  # ═══════════════════════════════════════════════════════════════════
  # FRONTEND (Next.js)
  # ═══════════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.casainfante.drozast.xyz}
    container_name: casainfante-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.casainfante.drozast.xyz}
    ports:
      - "3040:3000"
    networks:
      - casainfante-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  casainfante-network:
    driver: bridge
